# Railway service configuration for the standalone admin dashboard
# at admin.krishnavillage.com.au
#
# HOW TO USE:
#   1. In Railway, create a new service from the Aptlication/krishnavillage repo
#   2. Set the Start Command to exactly:
#        node artifacts/admin/server.mjs
#   3. Add these environment variables in Railway → Variables:
#        STANDALONE=true
#        API_URL=https://api-server-production-3787.up.railway.app
#        (PORT is set automatically by Railway)
#
#      Auth is performed by the browser against the API server — the admin
#      service does not need any credentials env vars. (ADMIN_BYPASS_SECRET,
#      if you use it, belongs on the API server, not here.)
#   4. Add custom domain: admin.krishnavillage.com.au
#   5. Copy the CNAME target Railway provides and add it in your DNS:
#        admin  CNAME  <railway-provided-value>  (TTL 3600)
#
# Railway builds this service via Dockerfile.admin at the repo root, which runs
#   pnpm --filter @workspace/admin run build:standalone
# inside the container. The build emits root-relative asset paths (BASE_PATH=/)
# to match STANDALONE=true above. The committed artifacts/admin/dist/public/ is
# overwritten by the in-container build, so committing a stale dist is harmless
# but unnecessary.
#
# If you want to skip the in-container build (e.g. for faster deploys), strip
# the RUN line from Dockerfile.admin and commit a fresh dist after each source
# change with:
#   pnpm --filter @workspace/admin run build:standalone

[service]
startCommand = "node artifacts/admin/server.mjs"

[service.envVars]
STANDALONE = "true"
# Set this as a Railway variable, not here:
# API_URL = "https://api-server-production-3787.up.railway.app"
