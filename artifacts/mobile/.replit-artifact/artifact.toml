kind = "mobile"
previewPath = "/"
title = "Krishna Village Guest App"
version = "1.0.0"
id = "artifacts/mobile"
router = "path"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
localPort = 18115
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/mobile run dev"

[services.production]
build = "pnpm --filter @workspace/mobile run build"
run = "pnpm --filter @workspace/mobile run serve"
